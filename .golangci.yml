version: "2"

linters:
  default: standard
  enable:
    - ginkgolinter
    - misspell
    - revive
    - unconvert
    - unparam
  settings:
    revive:
      rules:
        - name: dot-imports
          arguments:
            - allowed-packages:
                - "github.com/onsi/ginkgo/v2"
                - "github.com/onsi/gomega"
