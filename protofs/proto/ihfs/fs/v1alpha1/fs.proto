syntax = "proto3";

package unstoppablemango.ihfs.fs.v1alpha1;

import "google/protobuf/timestamp.proto";
import "ihfs/v1alpha1/types.proto";

option go_package = "github.com/unstoppablemango/ihfs/protofs/gen/ihfs/fs/v1alpha1;fsv1alpha1";

// FsService exposes filesystem operations over gRPC.
service FsService {
  // Open opens the named file for reading.
  rpc Open(OpenRequest) returns (OpenResponse);
  // Stat returns FileInfo for the named file.
  rpc Stat(StatRequest) returns (StatResponse);
  // ReadDir reads the directory named and returns a list of directory entries.
  rpc ReadDir(ReadDirRequest) returns (ReadDirResponse);
  // ReadFile reads the named file and returns the contents.
  rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);
  // Glob returns the names of all files matching pattern.
  rpc Glob(GlobRequest) returns (GlobResponse);
  // Create creates or truncates the named file.
  rpc Create(CreateRequest) returns (CreateResponse);
  // WriteFile writes data to the named file, creating it if necessary.
  rpc WriteFile(WriteFileRequest) returns (WriteFileResponse);
  // Mkdir creates a new directory with the specified name and permission bits.
  rpc Mkdir(MkdirRequest) returns (MkdirResponse);
  // MkdirAll creates a directory path along with any necessary parents.
  rpc MkdirAll(MkdirAllRequest) returns (MkdirAllResponse);
  // Remove removes the named file or empty directory.
  rpc Remove(RemoveRequest) returns (RemoveResponse);
  // RemoveAll removes path and any children it contains.
  rpc RemoveAll(RemoveAllRequest) returns (RemoveAllResponse);
  // Rename renames (moves) oldpath to newpath.
  rpc Rename(RenameRequest) returns (RenameResponse);
  // Chmod changes the mode of the named file.
  rpc Chmod(ChmodRequest) returns (ChmodResponse);
  // Chown changes the numeric uid and gid of the named file.
  rpc Chown(ChownRequest) returns (ChownResponse);
  // Chtimes changes the access and modification times of the named file.
  rpc Chtimes(ChtimesRequest) returns (ChtimesResponse);
  // Symlink creates a symbolic link named newname pointing to oldname.
  rpc Symlink(SymlinkRequest) returns (SymlinkResponse);
  // ReadLink returns the destination of the named symbolic link.
  rpc ReadLink(ReadLinkRequest) returns (ReadLinkResponse);
  // Lstat returns FileInfo for the named file, without following symlinks.
  rpc Lstat(LstatRequest) returns (LstatResponse);
}

message OpenRequest {
  string name = 1;
}

message OpenResponse {
  unstoppablemango.ihfs.v1alpha1.File file = 1;
}

message StatRequest {
  string name = 1;
}

message StatResponse {
  unstoppablemango.ihfs.v1alpha1.FileInfo file_info = 1;
}

message ReadDirRequest {
  string name = 1;
}

message ReadDirResponse {
  repeated unstoppablemango.ihfs.v1alpha1.DirEntry entries = 1;
}

message ReadFileRequest {
  string name = 1;
}

message ReadFileResponse {
  bytes data = 1;
}

message GlobRequest {
  string pattern = 1;
}

message GlobResponse {
  repeated string matches = 1;
}

message CreateRequest {
  string name = 1;
}

message CreateResponse {
  unstoppablemango.ihfs.v1alpha1.File file = 1;
}

message WriteFileRequest {
  string name = 1;
  bytes data = 2;
  uint32 perm = 3;
}

message WriteFileResponse {}

message MkdirRequest {
  string name = 1;
  uint32 mode = 2;
}

message MkdirResponse {}

message MkdirAllRequest {
  string name = 1;
  uint32 mode = 2;
}

message MkdirAllResponse {}

message RemoveRequest {
  string name = 1;
}

message RemoveResponse {}

message RemoveAllRequest {
  string name = 1;
}

message RemoveAllResponse {}

message RenameRequest {
  string oldpath = 1;
  string newpath = 2;
}

message RenameResponse {}

message ChmodRequest {
  string name = 1;
  uint32 mode = 2;
}

message ChmodResponse {}

message ChownRequest {
  string name = 1;
  int32 uid = 2;
  int32 gid = 3;
}

message ChownResponse {}

message ChtimesRequest {
  string name = 1;
  google.protobuf.Timestamp atime = 2;
  google.protobuf.Timestamp mtime = 3;
}

message ChtimesResponse {}

message SymlinkRequest {
  string oldname = 1;
  string newname = 2;
}

message SymlinkResponse {}

message ReadLinkRequest {
  string name = 1;
}

message ReadLinkResponse {
  string target = 1;
}

message LstatRequest {
  string name = 1;
}

message LstatResponse {
  unstoppablemango.ihfs.v1alpha1.FileInfo file_info = 1;
}
